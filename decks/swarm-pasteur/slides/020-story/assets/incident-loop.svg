<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" role="img" aria-labelledby="title desc">
  <title id="title">Incident response in three moves</title>
  <desc id="desc">A three-step operational loop labeled Detect, Contain, and Communicate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#e5eef6" />
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 z" fill="#246bce" />
    </marker>
  </defs>
  <rect width="640" height="460" rx="28" fill="url(#bg)" />
  <g fill="none" stroke="#246bce" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.9">
    <path d="M218 118 C272 54 368 44 430 104" />
    <path d="M468 180 C502 250 470 340 394 376" />
    <path d="M268 378 C174 354 134 246 176 166" />
  </g>
  <g font-family="Aptos, Segoe UI, sans-serif">
    <g transform="translate(120 110)">
      <circle cx="80" cy="72" r="62" fill="#dcecff" />
      <circle cx="80" cy="72" r="43" fill="#246bce" opacity="0.12" />
      <text x="80" y="64" text-anchor="middle" font-size="16" font-weight="700" fill="#246bce" letter-spacing="1.5">MOVE 1</text>
      <text x="80" y="94" text-anchor="middle" font-size="28" font-weight="800" fill="#102033">Detect</text>
    </g>
    <g transform="translate(378 110)">
      <circle cx="80" cy="72" r="62" fill="#fff1d8" />
      <circle cx="80" cy="72" r="43" fill="#d88b19" opacity="0.14" />
      <text x="80" y="64" text-anchor="middle" font-size="16" font-weight="700" fill="#d88b19" letter-spacing="1.5">MOVE 2</text>
      <text x="80" y="94" text-anchor="middle" font-size="28" font-weight="800" fill="#102033">Contain</text>
    </g>
    <g transform="translate(248 282)">
      <circle cx="80" cy="72" r="62" fill="#dbf4e8" />
      <circle cx="80" cy="72" r="43" fill="#1f8a62" opacity="0.14" />
      <text x="80" y="64" text-anchor="middle" font-size="16" font-weight="700" fill="#1f8a62" letter-spacing="1.5">MOVE 3</text>
      <text x="80" y="94" text-anchor="middle" font-size="24" font-weight="800" fill="#102033">Communicate</text>
    </g>
  </g>
</svg>
