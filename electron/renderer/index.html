<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation Desktop</title>
  <link rel="stylesheet" href="../../node_modules/xterm/css/xterm.css">
  <link rel="stylesheet" href="./app.css">
  <script src="../../node_modules/xterm/lib/xterm.js"></script>
  <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
</head>
<body>
  <div id="app-shell" class="app-shell" data-state="no-project">

    <header class="toolbar">
      <div class="toolbar-group">
        <button id="choose-path" type="button" class="tb" title="Open an existing presentation">Open</button>
        <button id="create-project" type="button" class="tb" title="Start a new presentation">New</button>
      </div>

      <div class="tb-sep"></div>
      <span id="project-name-label" class="tb-name"></span>

      <div class="tb-spacer"></div>

      <div class="toolbar-group requires-project">
        <button id="primary-action" type="button" class="tb tb-primary" style="display:none"></button>
        <button id="secondary-action" type="button" class="tb tb-dim" style="display:none"></button>
        <button id="more-actions" type="button" class="tb tb-dim" title="More options" disabled>
          More
        </button>
      </div>

      <span id="action-status-label" class="toolbar-status" aria-live="polite"></span>

      <div id="more-menu" class="more-menu" style="display:none">
        <div id="more-menu-items"></div>
      </div>
    </header>

    <main class="main-split">

      <div id="welcome-panel" class="welcome-panel">
        <div class="welcome-inner">
          <div class="welcome-mark">P</div>
          <h2>Presentation Desktop</h2>
          <p>Work with your assistant on one side and see the presentation update on the other.</p>
          <div class="welcome-actions">
            <button id="welcome-create" type="button" class="w-btn w-btn-primary">New presentation</button>
            <button id="welcome-open" type="button" class="w-btn w-btn-link">Open a presentation</button>
          </div>
          <input id="project-path" type="hidden">
          <input id="project-slides" type="hidden" value="3">
        </div>
      </div>

      <div id="terminal-pane" class="pane terminal-pane" style="display:none">
        <div class="pane-header terminal-header">
          <div>
            <div class="pane-title terminal-title">Assistant</div>
            <div id="terminal-state-label" class="pane-subtitle terminal-state-label"></div>
          </div>
          <div class="pane-actions">
            <button id="terminal-retry" type="button" class="tb tb-dim" style="display:none">Start</button>
            <button id="clear-terminal" type="button" class="tb tb-dim" title="Clear the terminal" style="display:none">Clear</button>
            <button id="stop-terminal" type="button" class="tb tb-dim" title="Stop the terminal session" style="display:none">Stop</button>
          </div>
        </div>
        <div id="terminal-empty-state" class="terminal-empty-state" style="display:none">
          <strong id="terminal-empty-title"></strong>
          <p id="terminal-empty-detail"></p>
        </div>
        <div id="terminal-container" class="terminal-container"></div>
      </div>

      <div id="preview-pane" class="pane preview-pane" style="display:none">
        <div class="pane-header preview-header">
          <div>
            <div class="pane-title preview-title">Presentation</div>
            <div class="pane-subtitle">Updates live while you work.</div>
          </div>
        </div>
        <div class="preview-canvas">
          <iframe id="preview-frame" class="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
      </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <div id="diagnostics-drawer" class="diag-drawer" style="display:none">
      <div class="diag-header">
        <strong>Developer Tools</strong>
        <button id="close-diagnostics" type="button" class="tb tb-icon">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="diag-body">
        <details class="diag-section" open><summary>Meta</summary><pre id="meta-json">{}</pre></details>
        <details class="diag-section" open><summary>State</summary><pre id="state-json">{}</pre></details>
        <details class="diag-section"><summary>Files</summary><pre id="files-json">{}</pre></details>
        <details class="diag-section"><summary>Action</summary><pre id="action-json">{}</pre></details>
        <details class="diag-section"><summary>Terminal</summary><pre id="terminal-meta">{}</pre></details>
        <details class="diag-section"><summary>Errors</summary><pre id="error-log" class="diag-errors"></pre></details>
      </div>
    </div>

    <span id="project-title" style="display:none"></span>
    <span id="project-path-label" style="display:none"></span>
    <span id="slide-count" style="display:none"></span>
    <span id="project-status-badge" style="display:none"></span>
    <span id="status-pill" style="display:none"></span>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
