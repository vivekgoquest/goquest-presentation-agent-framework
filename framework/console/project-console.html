<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goquest Presentation Workspace</title>
  <link rel="stylesheet" href="/framework/console/project-console.css">
</head>
<body>
  <header class="topbar">
    <h1 id="project-title" class="topbar-title">Loading project&hellip;</h1>

    <nav class="topbar-menus">
      <div class="menu">
        <button class="menu-trigger" type="button">File</button>
        <div class="menu-dropdown">
          <button id="toggle-files" type="button">Browse files</button>
          <div class="menu-sep"></div>
          <button id="open-project-folder" type="button">Open project folder</button>
          <button id="open-outputs-folder" type="button">Open outputs folder</button>
          <div class="menu-sep"></div>
          <button id="open-pdf" type="button" disabled>Open PDF</button>
          <button id="open-screenshots" type="button" disabled>Open screenshots</button>
          <button id="open-summary" type="button" disabled>Open summary</button>
          <div class="menu-sep"></div>
          <button id="finalize-project" type="button" disabled>Finalize project</button>
        </div>
      </div>
      <div class="menu">
        <button class="menu-trigger" type="button">Agent</button>
        <div class="menu-dropdown">
          <button data-launch-mode="claude" type="button">Launch Claude</button>
          <button data-launch-mode="codex" type="button">Launch Codex</button>
          <button data-launch-mode="shell" type="button">Open shell</button>
          <div class="menu-sep"></div>
          <button id="send-to-codex" type="button">Send task to Codex</button>
          <div class="menu-sep"></div>
          <button id="restart-terminal" type="button" disabled>Restart</button>
          <button id="stop-terminal" type="button" disabled>Stop</button>
          <button id="clear-terminal" type="button" disabled>Clear output</button>
        </div>
      </div>
      <div class="menu">
        <button class="menu-trigger" type="button">View</button>
        <div class="menu-dropdown">
          <button id="reload-preview" type="button">Reload preview</button>
          <a id="open-preview" href="/preview/" target="_blank" rel="noreferrer">Preview in new tab</a>
        </div>
      </div>
    </nav>

    <div class="topbar-right">
      <span id="status-pill" class="status-pill">Loading&hellip;</span>
      <button id="export-pdf" type="button" class="btn-export" disabled>Export PDF</button>
    </div>
  </header>

  <main class="workspace">
    <!-- Left: Terminal -->
    <section class="col col-terminal">
      <div class="task-bar">
        <textarea id="agent-task" rows="1" placeholder="Describe what to build&hellip;"></textarea>
        <button id="send-to-claude" type="button" class="btn-send">Send</button>
      </div>
      <div class="quick-actions">
        <button type="button" data-prompt="review-deck-swarm" class="action-btn">Critique</button>
        <button type="button" data-prompt="verify-deck" class="action-btn">QA Check</button>
        <button type="button" data-prompt="fix-warnings" class="action-btn">Fix Warnings</button>
        <button type="button" data-prompt="finalize" class="action-btn">Finalize</button>
        <button type="button" data-prompt="export" class="action-btn">Export PDF</button>
      </div>
      <div class="terminal-info" id="terminal-info">
        <span id="agent-status" class="agent-status-text">Agent idle</span>
      </div>
      <div id="terminal-shell" class="terminal-area" hidden>
        <div id="terminal-pane" class="terminal-pane" aria-label="Agent terminal"></div>
      </div>
      <div id="agent-launcher" class="agent-launcher">
        <div class="launcher-content">
          <p class="launcher-prompt">Choose an agent to start building</p>
          <div class="launcher-buttons">
            <button data-launch-mode="claude" type="button" class="launcher-btn">Launch Claude</button>
            <button data-launch-mode="codex" type="button" class="launcher-btn">Launch Codex</button>
            <button data-launch-mode="shell" type="button" class="launcher-btn">Open shell</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Draggable divider -->
    <div class="divider" id="main-divider" role="separator" aria-orientation="vertical" aria-label="Resize terminal and preview"></div>

    <!-- Right: Preview -->
    <section class="col col-preview">
      <iframe id="preview-frame" title="Presentation preview" src="/preview/"></iframe>
      <div class="slide-nav" id="slide-nav">
        <div class="slide-nav-left">
          <span id="brief-chip" class="pip" title="Brief">B</span>
          <span id="outline-chip" class="pip" title="Outline">O</span>
          <span id="slides-chip" class="pip" title="Slides">S</span>
          <span id="pdf-chip" class="pip" title="PDF">P</span>
          <span id="preview-status" class="preview-hint"></span>
        </div>
        <div class="slide-nav-right">
          <button id="prev-slide" type="button" class="nav-btn" aria-label="Previous slide" disabled>&lsaquo;</button>
          <span id="slide-counter" class="slide-counter">No slides</span>
          <button id="next-slide" type="button" class="nav-btn" aria-label="Next slide" disabled>&rsaquo;</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Files overlay -->
  <aside class="files-overlay" id="files-overlay">
    <div class="files-header">
      <h2>Project Files</h2>
      <button id="close-files" type="button" class="btn-icon" aria-label="Close">&times;</button>
    </div>
    <div class="selection-toolbar" id="selection-toolbar" hidden>
      <div class="selection-copy">
        <span class="selection-label">Selected</span>
        <strong id="selection-path">No file selected</strong>
      </div>
      <div class="selection-actions">
        <button id="copy-path" type="button">Copy path</button>
        <button id="open-selected" type="button">Open in Finder</button>
        <button id="reveal-selected" type="button">Reveal in terminal</button>
      </div>
    </div>
    <div id="file-tree" class="file-tree" aria-label="Project files"></div>
  </aside>

  <!-- Hidden elements for JS state (updated by JS but not displayed) -->
  <div hidden aria-hidden="true">
    <span id="workspace-status-chip"></span>
    <span id="project-meta"></span>
    <span id="outputs-hint"></span>
    <span id="terminal-mode"></span>
    <span id="terminal-cwd"></span>
    <span id="terminal-context"></span>
    <span id="terminal-state-chip"></span>
    <span id="last-output-chip"></span>
  </div>

  <script src="/framework/console/project-console.js"></script>
</body>
</html>
